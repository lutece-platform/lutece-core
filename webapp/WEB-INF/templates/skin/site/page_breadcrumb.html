<#list list_pages as page>
	<#if page?has_next>
		<a href="${site_path}?page_id=${page.getId()}" target="_top">${page.getName()!''}</a> &gt;
		<li class="breadcrumb-item">
			<a href="${site_path}?page_id=${page.getId()}" target="_top">${page.getName()!''}</a>
		</li>
	<#else>
		${page.getName()!''}
		<li class="breadcrumb-item active" aria-current="page">
			${page.getName()!''}
		</li>
	</#if>
</#list>
